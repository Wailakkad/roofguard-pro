<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 100 100" 
     width="100" 
     height="100">
  
  <!-- Orange rounded square background -->
  <rect 
    x="0" y="0" 
    width="100" height="100" 
    rx="22" ry="22" 
    fill="#f97316"/>
  
  <!-- White house icon centered -->
  <g transform="translate(50,50) scale(0.6) translate(-50,-50)">
    <!-- House roof triangle -->
    <polygon 
      points="50,15 85,45 15,45" 
      fill="#ffffff"/>
    <!-- House body rectangle -->
    <rect 
      x="28" y="45" 
      width="44" height="38" 
      fill="#ffffff"/>
    <!-- Door cutout -->
    <rect 
      x="42" y="62" 
      width="16" height="21" 
      fill="#f97316"/>
    <!-- Chimney -->
    <rect 
      x="62" y="22" 
      width="8" height="18" 
      fill="#ffffff"/>
  </g>
  
</svg>
